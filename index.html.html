<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>상하이상하이트위스타를추면서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root { --red:#D42B2B; --gold:#F5C842; --dark:#1C0A0A; --cream:#FFF9F0; --radius:22px; }
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);min-height:100vh;overflow-x:hidden;}

/* ══ HEADER ══ */
.header{background:linear-gradient(135deg,#B71C1C 0%,#D42B2B 55%,#C62828 100%);padding:0 0 8px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(183,28,28,0.4);}

/* ── DANCE STAGE ── */
.dance-stage{display:flex;align-items:flex-end;justify-content:center;padding:6px 4px 2px;gap:6px;height:96px;overflow:hidden;}
.dancer-svg{flex-shrink:0;transform-origin:bottom center;filter:drop-shadow(0 3px 5px rgba(0,0,0,0.22));}
.dancer-svg:nth-child(1){animation:twistA .55s ease-in-out infinite alternate;}
.dancer-svg:nth-child(2){animation:twistB .6s ease-in-out infinite alternate 0.08s;}
.dancer-svg:nth-child(3){animation:twistA .5s ease-in-out infinite alternate 0.14s;}
.dancer-svg:nth-child(4){animation:twistB .58s ease-in-out infinite alternate 0.05s;}
.dancer-svg:nth-child(5){animation:twistA .52s ease-in-out infinite alternate 0.18s;}
.dancer-svg:nth-child(6){animation:twistB .56s ease-in-out infinite alternate 0.1s;}

@keyframes twistA{
  0%{transform:rotate(-15deg) translateY(0);}
  100%{transform:rotate(15deg) translateY(-9px);}
}
@keyframes twistB{
  0%{transform:rotate(14deg) translateY(-5px) scaleX(.94);}
  100%{transform:rotate(-14deg) translateY(0) scaleX(1.04);}
}

/* floating music notes */
.float-note{position:absolute;font-size:.85rem;animation:floatUp 1.8s ease-in-out infinite;pointer-events:none;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:.8}50%{transform:translateY(-10px) scale(1.2);opacity:1}100%{transform:translateY(0) scale(1);opacity:.8}}

/* ══ APP TITLE ══ */
.app-title-row{text-align:center;padding:4px 12px 8px;}
.app-title{font-family:'Noto Serif KR',serif;font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.3;text-shadow:0 2px 8px rgba(0,0,0,.3);}
.app-subtitle{font-size:.68rem;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:1px;}

/* ══ MAIN GRID ══ */
#mainScreen{padding:16px 14px 80px;max-width:540px;margin:0 auto;}
.grid-label{font-size:.78rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;text-align:center;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cat-card{border-radius:var(--radius);padding:20px 14px 18px;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;transition:transform .18s,box-shadow .18s;box-shadow:0 4px 18px rgba(0,0,0,.13);border:none;text-align:center;}
.cat-card:active{transform:scale(.96);}
.cat-card::before{content:'';position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1);}
.cat-emoji{font-size:2.4rem;line-height:1;}
.cat-name{font-weight:700;font-size:.9rem;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.2);line-height:1.2;}
.cat-count{font-size:.68rem;color:rgba(255,255,255,.8);font-weight:400;}
.cat-daily{background:linear-gradient(135deg,#FF6B9D,#FF8E53);}
.cat-restaurant{background:linear-gradient(135deg,#C8102E,#e84060);}
.cat-flight{background:linear-gradient(135deg,#1565C0,#1e88e5);}
.cat-hotel{background:linear-gradient(135deg,#4A148C,#8e24aa);}
.cat-sight{background:linear-gradient(135deg,#1B5E20,#43a047);}
.cat-shop{background:linear-gradient(135deg,#E65100,#fb8c00);}
.cat-transport{background:linear-gradient(135deg,#263238,#546e7a);}
.cat-emergency{background:linear-gradient(135deg,#880E4F,#d81b60);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.cat-card{animation:fadeUp .35s ease both;}
.cat-card:nth-child(1){animation-delay:.04s}.cat-card:nth-child(2){animation-delay:.08s}
.cat-card:nth-child(3){animation-delay:.12s}.cat-card:nth-child(4){animation-delay:.16s}
.cat-card:nth-child(5){animation-delay:.2s}.cat-card:nth-child(6){animation-delay:.24s}
.cat-card:nth-child(7){animation-delay:.28s}.cat-card:nth-child(8){animation-delay:.32s}

/* ══ PHRASE SCREEN ══ */
#phraseScreen{display:none;padding:0 0 80px;max-width:540px;margin:0 auto;}
.phrase-hero{padding:18px 18px 16px;display:flex;align-items:center;gap:12px;}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.back-btn:hover{background:rgba(255,255,255,.35);}
.hero-info{flex:1;}
.hero-title-text{font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:700;color:#fff;}
.hero-sub-text{font-size:.72rem;color:rgba(255,255,255,.78);margin-top:1px;}

/* SUB TABS */
.sub-tabs{display:flex;gap:8px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none;}
.sub-tabs::-webkit-scrollbar{display:none;}
.sub-tab{background:#fff;border:2px solid #e8e8e8;border-radius:50px;padding:6px 14px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;color:#777;transition:all .18s;font-family:'Noto Sans KR',sans-serif;}
.sub-tab.active,.sub-tab:hover{background:var(--red);border-color:var(--red);color:#fff;}

.phrase-search{padding:10px 14px 4px;}
.search-inner{display:flex;align-items:center;background:#fff;border-radius:50px;border:2px solid #eee;padding:8px 16px;gap:8px;transition:border-color .2s;}
.search-inner:focus-within{border-color:var(--red);}
.search-inner input{border:none;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:.88rem;width:100%;background:transparent;color:var(--dark);}

.phrase-list{padding:10px 14px;}
.phrase-card{background:#fff;border-radius:16px;box-shadow:0 3px 16px rgba(0,0,0,.07);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid #f2ecec;}
.phrase-card:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.11);}
.pc-header{display:flex;align-items:center;padding:14px 16px;gap:11px;}
.pc-num{width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pc-ko{font-size:.88rem;font-weight:500;flex:1;line-height:1.35;}
.pc-arrow{font-size:.85rem;color:#ccc;transition:transform .2s;flex-shrink:0;}
.phrase-card.open .pc-arrow{transform:rotate(90deg);color:var(--red);}
.badge-pill{font-size:.62rem;font-weight:700;border-radius:20px;padding:2px 7px;margin-left:5px;}
.badge-must{background:#fff0f0;color:var(--red);}
.pc-body{display:none;padding:0 16px 14px;}
.phrase-card.open .pc-body{display:block;}
.zh-row{display:flex;align-items:baseline;gap:10px;margin-top:10px;flex-wrap:wrap;}
.zh-char{font-family:'ZCOOL XiaoWei',serif;font-size:1.55rem;color:var(--red);letter-spacing:3px;}
.py-text{font-size:.82rem;color:#999;font-style:italic;}
.pr-box{margin-top:8px;background:#fff8f0;border-left:3px solid var(--gold);border-radius:8px;padding:7px 11px;font-size:.8rem;color:#555;}
.pr-box strong{color:#333;}
.tip-box{margin-top:7px;background:#f8f8f8;border-radius:8px;padding:7px 11px;font-size:.76rem;color:#777;line-height:1.5;}
.tip-label{color:var(--red);font-weight:700;margin-right:4px;}
.copy-btn{margin-top:9px;background:var(--red);color:#fff;border:none;border-radius:30px;padding:5px 14px;font-size:.75rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s;}
.copy-btn:hover{background:#a00c22;}

/* NUMBER GRID */
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 14px 12px;}
.num-card{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.07);border:1.5px solid #f2ecec;cursor:pointer;transition:background .2s,transform .15s;}
.num-card:active{transform:scale(.95);}
.num-arabic{font-size:1.1rem;font-weight:900;color:#555;}
.num-zh{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;color:var(--red);line-height:1.1;}
.num-py{font-size:.68rem;color:#aaa;font-style:italic;margin-top:1px;}
.num-pr{font-size:.7rem;color:#555;font-weight:600;margin-top:1px;}
.num-section-label{font-size:.72rem;font-weight:700;color:#aaa;letter-spacing:2px;text-align:center;padding:14px 0 6px;}
.num-tip-box{margin:4px 14px 10px;background:#fff8f0;border-radius:12px;padding:12px 14px;font-size:.76rem;color:#777;line-height:1.7;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0e8e8;display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:150;box-shadow:0 -4px 20px rgba(0,0,0,.06);}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 16px;border-radius:12px;transition:background .15s;}
.nav-btn:hover{background:#fff0f0;}
.nav-icon{font-size:1.4rem;}
.nav-label{font-size:.6rem;color:#bbb;font-family:'Noto Sans KR',sans-serif;font-weight:500;}
.nav-btn.active .nav-label{color:var(--red);}
.empty-msg{text-align:center;padding:40px 20px;color:#bbb;font-size:.85rem;}
</style>
</head>
<body>

<header class="header">
  <div class="dance-stage">

    <!-- 시추 (Shih Tzu) - brown/white -->
    <svg class="dancer-svg" width="52" height="80" viewBox="0 0 52 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- music note above -->
      <text x="2" y="10" font-size="9" fill="#FFD700" opacity="0.9" style="animation:floatUp 1.6s ease-in-out infinite;">♪</text>
      <!-- left ear -->
      <ellipse cx="11" cy="30" rx="7" ry="11" fill="#C8965A" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="11" cy="30" rx="4.5" ry="8" fill="#E0B07A"/>
      <!-- right ear -->
      <ellipse cx="41" cy="30" rx="7" ry="11" fill="#C8965A" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="41" cy="30" rx="4.5" ry="8" fill="#E0B07A"/>
      <!-- head -->
      <ellipse cx="26" cy="28" rx="17" ry="16" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="2"/>
      <!-- top fur poof -->
      <ellipse cx="20" cy="14" rx="7" ry="6" fill="#C8965A" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="26" cy="12" rx="7" ry="6" fill="#C8965A" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="32" cy="14" rx="7" ry="6" fill="#C8965A" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- face patches -->
      <ellipse cx="18" cy="26" rx="5" ry="5" fill="#C8965A"/>
      <ellipse cx="34" cy="26" rx="5" ry="5" fill="#C8965A"/>
      <!-- eyes -->
      <circle cx="19" cy="25" r="4" fill="#1a0808" stroke="#2d1a0a" stroke-width="1"/>
      <circle cx="33" cy="25" r="4" fill="#1a0808" stroke="#2d1a0a" stroke-width="1"/>
      <circle cx="20" cy="24" r="1.2" fill="white"/>
      <circle cx="34" cy="24" r="1.2" fill="white"/>
      <!-- blush -->
      <ellipse cx="13" cy="31" rx="4" ry="2.5" fill="#FFB5C8" opacity="0.6"/>
      <ellipse cx="39" cy="31" rx="4" ry="2.5" fill="#FFB5C8" opacity="0.6"/>
      <!-- nose -->
      <ellipse cx="26" cy="33" rx="4" ry="2.5" fill="#C88080" stroke="#2d1a0a" stroke-width="1"/>
      <!-- mouth -->
      <path d="M22 36 Q26 40 30 36" stroke="#2d1a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- tongue -->
      <ellipse cx="26" cy="39" rx="3" ry="2.5" fill="#FF8FAB"/>
      <!-- body -->
      <ellipse cx="26" cy="60" rx="16" ry="17" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="2"/>
      <!-- body fur texture -->
      <ellipse cx="26" cy="60" rx="10" ry="12" fill="#E8D8B0" opacity="0.5"/>
      <!-- left arm - raised up -->
      <ellipse cx="9" cy="54" rx="5" ry="9" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="1.5" transform="rotate(-35 9 54)"/>
      <circle cx="6" cy="47" r="4" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- right arm - raised -->
      <ellipse cx="43" cy="54" rx="5" ry="9" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="1.5" transform="rotate(35 43 54)"/>
      <circle cx="46" cy="47" r="4" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- legs -->
      <ellipse cx="19" cy="75" rx="6" ry="5" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="33" cy="75" rx="6" ry="5" fill="#F0E4C8" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- wiggle lines on body -->
      <path d="M18 63 Q15 67 18 71" stroke="#2d1a0a" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
      <path d="M34 63 Q37 67 34 71" stroke="#2d1a0a" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
    </svg>

    <!-- 말티즈 (Maltese) - all white fluffy -->
    <svg class="dancer-svg" width="52" height="80" viewBox="0 0 52 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="34" y="10" font-size="9" fill="#87CEEB" opacity="0.9" style="animation:floatUp 2s ease-in-out infinite 0.4s;">♫</text>
      <!-- ears -->
      <ellipse cx="11" cy="30" rx="8" ry="13" fill="#F8F4F0" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="41" cy="30" rx="8" ry="13" fill="#F8F4F0" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- head -->
      <ellipse cx="26" cy="28" rx="17" ry="16" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="2"/>
      <!-- top poof fur -->
      <ellipse cx="18" cy="14" rx="7" ry="6" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="26" cy="11" rx="8" ry="6" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="34" cy="14" rx="7" ry="6" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- eyes -->
      <circle cx="19" cy="26" r="4" fill="#1a0808" stroke="#2d1a0a" stroke-width="1"/>
      <circle cx="33" cy="26" r="4" fill="#1a0808" stroke="#2d1a0a" stroke-width="1"/>
      <circle cx="20" cy="25" r="1.2" fill="white"/>
      <circle cx="34" cy="25" r="1.2" fill="white"/>
      <!-- blush -->
      <ellipse cx="13" cy="32" rx="4" ry="2.5" fill="#FFB5C8" opacity="0.6"/>
      <ellipse cx="39" cy="32" rx="4" ry="2.5" fill="#FFB5C8" opacity="0.6"/>
      <!-- nose -->
      <ellipse cx="26" cy="34" rx="3.5" ry="2.2" fill="#D88888" stroke="#2d1a0a" stroke-width="1"/>
      <!-- mouth + tongue -->
      <path d="M22 37 Q26 41 30 37" stroke="#2d1a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="26" cy="40" rx="3" ry="2.5" fill="#FF8FAB"/>
      <!-- body fluffy -->
      <ellipse cx="26" cy="60" rx="17" ry="17" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="2"/>
      <ellipse cx="26" cy="58" rx="12" ry="10" fill="#F5F0ED" opacity="0.6"/>
      <!-- left arm raised -->
      <ellipse cx="8" cy="53" rx="5" ry="9" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5" transform="rotate(-40 8 53)"/>
      <circle cx="4" cy="46" r="4.5" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- right arm -->
      <ellipse cx="44" cy="53" rx="5" ry="9" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5" transform="rotate(40 44 53)"/>
      <circle cx="48" cy="46" r="4.5" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- legs -->
      <ellipse cx="19" cy="75" rx="6.5" ry="5" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <ellipse cx="33" cy="75" rx="6.5" ry="5" fill="#FFFFFF" stroke="#2d1a0a" stroke-width="1.5"/>
      <!-- wiggle -->
      <path d="M17 63 Q14 67 17 71" stroke="#2d1a0a" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
      <path d="M35 63 Q38 67 35 71" stroke="#2d1a0a" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
    </svg>

    <!-- 고등어 태비 고양이 (Tabby Cat) - grey striped -->
    <svg class="dancer-svg" width="56" height="84" viewBox="0 0 56 84" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="36" y="9" font-size="9" fill="#C8A0E8" opacity="0.9" style="animation:floatUp 1.7s ease-in-out infinite 0.2s;">♩</text>
      <text x="6" y="9" font-size="8" fill="#90EE90" opacity="0.85" style="animation:floatUp 2.1s ease-in-out infinite 0.6s;">♪</text>
      <!-- left ear -->
      <polygon points="10,24 16,8 22,24" fill="#B0B0B0" stroke="#2d1a0a" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="12,23 16,11 20,23" fill="#FFB5C8"/>
      <!-- right ear -->
      <polygon points="34,24 40,8 46,24" fill="#B0B0B0" stroke="#2d1a0a" stroke-width="1.8" stroke-linejoin="round"/>
      <polygon points="36,23 40,11 44,23" fill="#FFB5C8"/>
      <!-- head -->
      <ellipse cx="28" cy="30" rx="18" ry="17" fill="#C8C8C8" stroke="#2d1a0a" stroke-width="2"/>
      <!-- head stripes -->
      <path d="M22 17 Q28 14 34 17" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M20 20 Q28 17 36 20" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- white muzzle area -->
      <ellipse cx="28" cy="34" rx="10" ry="8" fill="#F0F0F0"/>
      <!-- eyes - big and round -->
      <circle cx="20" cy="28" r="5" fill="#1a0808" stroke="#2d1a0a" stroke-width="1.2"/>
      <circle cx="36" cy="28" r="5" fill="#1a0808" stroke="#2d1a0a" stroke-width="1.2"/>
      <circle cx="21" cy="27" r="1.5" fill="white"/>
      <circle cx="37" cy="27" r="1.5" fill="white"/>
      <!-- blush -->
      <ellipse cx="13" cy="34" rx="4.5" ry="2.5" fill="#FFB5C8" opacity="0.65"/>
      <ellipse cx="43" cy="34" rx="4.5" ry="2.5" fill="#FFB5C8" opacity="0.65"/>
      <!-- nose -->
      <ellipse cx="28" cy="35" rx="3.5" ry="2.2" fill="#E07878" stroke="#2d1a0a" stroke-width="1"/>
      <!-- mouth + tongue -->
      <path d="M23 38 Q28 43 33 38" stroke="#2d1a0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="28" cy="42" rx="3.5" ry="3" fill="#FF8FAB"/>
      <!-- body -->
      <ellipse cx="28" cy="63" rx="17" ry="18" fill="#C8C8C8" stroke="#2d1a0a" stroke-width="2"/>
      <!-- body stripes -->
      <path d="M20 54 Q28 50 36 54" stroke="#999" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M18 60 Q28 56 38 60" stroke="#999" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M19 66 Q28 63 37 66" stroke="#999" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- white belly -->
      <ellipse cx="28" cy="65" rx="9" ry="11" fill="#F0F0F0" opacity="0.8"/>
      <!-- left arm raised high -->
      <ellipse cx="9" cy="55" rx="5" ry="10" fill="#C8C8C8" stroke="#2d1a0a" stroke-width="1.8" transform="rotate(-45 9 55)"/>
      <circle cx="4" cy="47" r="5" fill="#C8C8C8" stroke="#2d1a0a" stroke-width="1.8"/>
      <!-- right arm -->
      <ellipse cx="47" cy="55" rx="5" ry="10" fill="#C8C8C8" stroke="#2d1a0a" stroke-width="1.8" transform="rotate(45 47 55)"/>
      <circle cx="52" cy="47" r="5" fill="#C8C8C8" stroke="#2d1a0a" stroke-width="1.8"/>

    {ko:'___에 가주세요 (택시)',zh:'去___，谢谢',py:'Qù ___, xièxie',pr:'취 ___, 씨에씨에',tip:'지도 화면 보여주면 확실. 滴滴(디디) 앱 추천',must:true},
    {ko:'미터기 켜주세요',zh:'请打表',py:'Qǐng dǎ biǎo',pr:'칭 다 비아오',tip:'미터 없이 부르면 협상 필요'},
    {ko:'지하철역이 어디예요?',zh:'地铁站在哪里？',py:'Dìtiě zhàn zài nǎlǐ?',pr:'띠티에 잔 짜이 나리?',tip:'출구: 出口(추코우)'},
    {ko:'___역 표 1장 주세요',zh:'我要一张去___站的票',py:'Wǒ yào yī zhāng qù ___ zhàn de piào',pr:'워 야오 이 짱 취 ___ 잔 더 피아오',tip:'매표소(售票处)에서 역명 보여주면 편함'},
    {ko:'여기서 내려주세요',zh:'就在这里停一下',py:'Jiù zài zhèlǐ tíng yīxià',pr:'지우 짜이 쪄리 팅 이시아',tip:'到了(다오러)=다 왔어요'},
    {ko:'고속철 표 사고 싶어요',zh:'我想买高铁票',py:'Wǒ xiǎng mǎi gāotiě piào',pr:'워 샹 마이 까오티에 피아오',tip:'12306 앱 미리 예매. 여권 필수'},
    {ko:'버스 몇 번 타요?',zh:'坐几路公共汽车？',py:'Zuò jǐ lù gōnggòng qìchē?',pr:'쭤 지 루 공공 치처?',tip:'목적지 보여주며 물어보면 됨'},

  emergency:{name:'긴급상황',emoji:'🆘',sub:'위기상황 필수표현',colorClass:'cat-emergency',heroGrad:'linear-gradient(135deg,#880E4F,#d81b60)',phrases:[
    {ko:'도와주세요!',zh:'救命！/ 帮帮我！',py:'Jiùmìng! / Bāngbang wǒ!',pr:'지우밍! / 방방 워!',tip:'救命=생명위험, 帮帮我=일반도움',must:true},
    {ko:'경찰 불러주세요',zh:'请帮我叫警察！',py:'Qǐng bāng wǒ jiào jǐngchá!',pr:'칭 방 워 자오 징차!',tip:'신고 번호: 110'},
    {ko:'병원에 데려다 주세요',zh:'请送我去医院',py:'Qǐng sòng wǒ qù yīyuàn',pr:'칭 쏭 워 취 이위엔',tip:'구급차: 120. 응급실: 急诊室'},
    {ko:'지갑을 잃어버렸어요',zh:'我的钱包丢了',py:'Wǒ de qiánbāo diū le',pr:'워 더 치엔바오 디우 러',tip:'手机=핸드폰, 护照=여권으로 교체'},
    {ko:'여기가 아파요',zh:'这里很疼',py:'Zhèlǐ hěn téng',pr:'쪄리 헌 텅',tip:'头疼=두통, 肚子疼=복통, 喉咙疼=인후통'},
    {ko:'알레르기가 있어요',zh:'我对___过敏',py:'Wǒ duì ___ guòmǐn',pr:'워 뚜이 ___ 꾸오민',tip:'花生=땅콩, 海鲜=해산물, 乳制品=유제품'},
    {ko:'한국 대사관 번호 알려주세요',zh:'韩国大使馆的电话号码是多少？',py:'Hánguó dàshǐguǎn de diànhuà hàomǎ shì duōshǎo?',pr:'한궈 다스관 더 디엔화 하오마 스 둬샤오?',tip:'베이징 한국대사관: +86-10-8531-0700'},
    {ko:'병원이 어디예요?',zh:'医院在哪儿？',py:'Yīyuàn zài nǎr?',pr:'이위엔 짜이 나알?',tip:'약국: 药店(야오디엔)'},
  ]},
};

let currentCat=null, currentSubTab='전체';
let favorites=(()=>{try{return JSON.parse(localStorage.getItem('shFavs')||'[]');}catch(e){return [];}})();

function renderHome(){
  const g=document.getElementById('catGrid'); g.innerHTML='';
  Object.entries(CATS).forEach(([k,c])=>{
    const d=document.createElement('div'); d.className='cat-card '+c.colorClass;
    d.innerHTML=`<div class="cat-emoji">${c.emoji}</div><div class="cat-name">${c.name}</div><div class="cat-count">${c.phrases.length}개 표현${k==='daily'?' + 숫자':''}</div>`;
    d.onclick=()=>openCat(k); g.appendChild(d);
  });
}

function openCat(key){
  currentCat=key; const c=CATS[key];
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('phraseScreen').style.display='block';
  document.getElementById('phraseHero').style.background=c.heroGrad;
  document.getElementById('heroTitle').textContent=c.emoji+' '+c.name;
  document.getElementById('heroSub').textContent=c.sub;
  document.getElementById('searchInput').value='';
  currentSubTab='전체';
  const tb=document.getElementById('subTabs'); tb.innerHTML='';
  if(c.subTabs){c.subTabs.forEach(t=>{const b=document.createElement('button');b.className='sub-tab'+(t==='전체'?' active':'');b.textContent=t;b.onclick=()=>{currentSubTab=t;document.querySelectorAll('.sub-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('searchInput').value='';renderPhraseList();};tb.appendChild(b);});}
  renderPhraseList(); window.scrollTo(0,0);
}

function renderPhraseList(q=''){
  const c=CATS[currentCat], list=document.getElementById('phraseList'); list.innerHTML='';
  if(currentCat==='daily'&&currentSubTab==='숫자·가격'){renderNumbers(list);return;}
  let phrases=c.phrases||[];
  if(currentCat==='daily'&&currentSubTab!=='전체') phrases=phrases.filter(p=>p.sub===currentSubTab);
  if(currentCat==='daily'&&currentSubTab==='전체') phrases=[...phrases,...NUM_PHRASES];
  if(q) phrases=phrases.filter(p=>p.ko.toLowerCase().includes(q)||p.zh.includes(q)||p.py.toLowerCase().includes(q));
  if(!phrases.length){list.innerHTML='<div class="empty-msg">😅 검색 결과가 없어요</div>';return;}
  const pl=document.createElement('div'); pl.className='phrase-list';
  phrases.forEach((p,i)=>{
    const fk=currentCat+'_'+i, isF=favorites.includes(fk), d=document.createElement('div'); d.className='phrase-card';
    d.innerHTML=`<div class="pc-header" onclick="toggleCard(this.parentElement)"><div class="pc-num">${i+1}</div><div class="pc-ko">${p.ko}${p.must?'<span class="badge-pill badge-must">필수</span>':''}</div><span style="font-size:1.05rem;cursor:pointer;margin-right:5px;" onclick="toggleFav(event,'${fk}',this)">${isF?'⭐':'☆'}</span><div class="pc-arrow">▶</div></div><div class="pc-body"><div class="zh-row"><span class="zh-char">${p.zh}</span><span class="py-text">${p.py}</span></div><div class="pr-box">🔊 한국어 발음: <strong>${p.pr}</strong></div>${p.tip?`<div class="tip-box"><span class="tip-label">💡 Tip</span>${p.tip}</div>`:''}<button class="copy-btn" onclick="copyZh(event,'${p.zh.replace(/'/g,"\\'")}')">📋 복사</button></div>`;
    pl.appendChild(d);
  }); list.appendChild(pl);
}

function renderNumbers(list){
  const lbl=document.createElement('p'); lbl.className='num-section-label'; lbl.textContent='숫자 카드 (탭하면 복사)'; list.appendChild(lbl);
  const g=document.createElement('div'); g.className='num-grid';
  NUMBERS.forEach(n=>{const c=document.createElement('div');c.className='num-card';c.innerHTML=`<div class="num-arabic">${n.n}</div><div class="num-zh">${n.zh}</div><div class="num-py">${n.py}</div><div class="num-pr">${n.pr}</div>`;c.onclick=()=>{navigator.clipboard.writeText(n.zh).then(()=>{c.style.background='#fff0f0';setTimeout(()=>c.style.background='',800);});};g.appendChild(c);});
  list.appendChild(g);
  const tip=document.createElement('div'); tip.className='num-tip-box';
  tip.innerHTML='<strong style="color:#D42B2B;">💡 숫자 조합 팁</strong><br>• <b>两(량)</b> vs <b>二(얼)</b>: 수량 앞=两, 순서/번호=二<br>• 21=二十一(얼스이), 35=三十五(싼스우), 99=九十九<br>• 100=一百(이바이), 1000=一千(이치엔), 10000=一万(이완)<br>• 가격: 숫자+<b>块(콰이)</b> 또는 <b>元(위엔)</b><br>• 예: 38元=三十八块(싼스바 콰이)';
  list.appendChild(tip);
  const lbl2=document.createElement('p'); lbl2.className='num-section-label'; lbl2.textContent='숫자 실용 표현'; list.appendChild(lbl2);
  const pl=document.createElement('div'); pl.className='phrase-list';
  NUM_PHRASES.forEach((p,i)=>{const d=document.createElement('div');d.className='phrase-card';d.innerHTML=`<div class="pc-header" onclick="toggleCard(this.parentElement)"><div class="pc-num">${i+1}</div><div class="pc-ko">${p.ko}${p.must?'<span class="badge-pill badge-must">필수</span>':''}</div><div class="pc-arrow">▶</div></div><div class="pc-body"><div class="zh-row"><span class="zh-char">${p.zh}</span><span class="py-text">${p.py}</span></div><div class="pr-box">🔊 <strong>${p.pr}</strong></div>${p.tip?`<div class="tip-box"><span class="tip-label">💡</span>${p.tip}</div>`:''}<button class="copy-btn" onclick="copyZh(event,'${p.zh.replace(/'/g,"\\'")}')">📋 복사</button></div>`;pl.appendChild(d);});
  list.appendChild(pl);
}

function toggleCard(c){c.classList.toggle('open');}
function copyZh(e,t){e.stopPropagation();navigator.clipboard.writeText(t).then(()=>{const b=e.target;b.textContent='✅ 복사됨!';setTimeout(()=>b.textContent='📋 복사',1500);});}
function toggleFav(e,k,el){e.stopPropagation();if(favorites.includes(k)){favorites=favorites.filter(f=>f!==k);el.textContent='☆';}else{favorites.push(k);el.textContent='⭐';}try{localStorage.setItem('shFavs',JSON.stringify(favorites));}catch(x){}}
function goBack(){document.getElementById('phraseScreen').style.display='none';document.getElementById('mainScreen').style.display='block';currentCat=null;}
function goHome(){goBack();}

document.getElementById('searchInput').addEventListener('input',function(){
  if(!currentCat||currentCat==='_all'||currentCat==='_fav')return;
  renderPhraseList(this.value.toLowerCase());
});

function openGlobalSearch(){
  currentCat='_all';
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('phraseScreen').style.display='block';
  document.getElementById('phraseHero').style.background='linear-gradient(135deg,#333,#555)';
  document.getElementById('heroTitle').textContent='🔍 전체 검색';
  document.getElementById('heroSub').textContent='모든 카테고리에서 검색';
  document.getElementById('subTabs').innerHTML='';
  document.getElementById('searchInput').value='';
  document.getElementById('phraseList').innerHTML='<div class="empty-msg">검색어를 입력하세요</div>';
  document.getElementById('searchInput').focus();
}
document.getElementById('searchInput').addEventListener('input',function(){
  if(currentCat!=='_all')return;
  const q=this.value.toLowerCase(), list=document.getElementById('phraseList');
  if(!q){list.innerHTML='<div class="empty-msg">검색어를 입력하세요</div>';return;}
  let all=[];
  Object.entries(CATS).forEach(([k,c])=>{(c.phrases||[]).forEach((p,i)=>{if(p.ko.toLowerCase().includes(q)||p.zh.includes(q)||p.py.toLowerCase().includes(q))all.push({...p,_cat:k,_i:i});});});
  NUM_PHRASES.forEach((p,i)=>{if(p.ko.toLowerCase().includes(q)||p.zh.includes(q))all.push({...p,_cat:'daily',_i:'n'+i});});
  list.innerHTML='';
  if(!all.length){list.innerHTML='<div class="empty-msg">결과 없음 😅</div>';return;}
  const pl=document.createElement('div');pl.className='phrase-list';
  all.forEach(p=>{const c=CATS[p._cat],d=document.createElement('div');d.className='phrase-card';d.innerHTML=`<div class="pc-header" onclick="toggleCard(this.parentElement)"><div class="pc-num">${c.emoji}</div><div class="pc-ko" style="font-size:.82rem">${p.ko}<span style="font-size:.62rem;color:#bbb;margin-left:5px;">${c.name}</span></div><div class="pc-arrow">▶</div></div><div class="pc-body"><div class="zh-row"><span class="zh-char">${p.zh}</span><span class="py-text">${p.py}</span></div><div class="pr-box">🔊 <strong>${p.pr}</strong></div>${p.tip?`<div class="tip-box"><span class="tip-label">💡</span>${p.tip}</div>`:''}<button class="copy-btn" onclick="copyZh(event,'${p.zh.replace(/'/g,"\\'")}')">📋 복사</button></div>`;pl.appendChild(d);});
  list.appendChild(pl);
});

function openFavorites(){
  currentCat='_fav';
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('phraseScreen').style.display='block';
  document.getElementById('phraseHero').style.background='linear-gradient(135deg,#b8860b,#f5c842)';
  document.getElementById('heroTitle').textContent='⭐ 즐겨찾기';
  document.getElementById('heroSub').textContent='저장한 표현 모음';
  document.getElementById('subTabs').innerHTML='';
  document.getElementById('searchInput').value='';
  const list=document.getElementById('phraseList'); list.innerHTML='';
  if(!favorites.length){list.innerHTML='<div class="empty-msg">⭐ 별표를 눌러 즐겨찾기에 추가하세요!</div>';return;}
  const pl=document.createElement('div');pl.className='phrase-list';
  favorites.forEach(fk=>{const pts=fk.split('_'),ck=pts[0],idx=parseInt(pts[1]),c=CATS[ck];if(!c)return;const p=(c.phrases||[])[idx];if(!p)return;const d=document.createElement('div');d.className='phrase-card';d.innerHTML=`<div class="pc-header" onclick="toggleCard(this.parentElement)"><div class="pc-num">${c.emoji}</div><div class="pc-ko">${p.ko}</div><span style="font-size:1.05rem;cursor:pointer;margin-right:5px;" onclick="removeFav(event,'${fk}',this)">⭐</span><div class="pc-arrow">▶</div></div><div class="pc-body"><div class="zh-row"><span class="zh-char">${p.zh}</span><span class="py-text">${p.py}</span></div><div class="pr-box">🔊 <strong>${p.pr}</strong></div>${p.tip?`<div class="tip-box"><span class="tip-label">💡</span>${p.tip}</div>`:''}<button class="copy-btn" onclick="copyZh(event,'${p.zh.replace(/'/g,"\\'")}')">📋 복사</button></div>`;pl.appendChild(d);});
  list.appendChild(pl);
}
function removeFav(e,k,el){e.stopPropagation();favorites=favorites.filter(f=>f!==k);try{localStorage.setItem('shFavs',JSON.stringify(favorites));}catch(x){}el.closest('.phrase-card').remove();if(!favorites.length)document.getElementById('phraseList').innerHTML='<div class="empty-msg">⭐ 별표를 눌러 즐겨찾기에 추가하세요!</div>';}

renderHome();
</script>
